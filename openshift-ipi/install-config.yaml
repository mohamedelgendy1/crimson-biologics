apiVersion: v1
baseDomain: sandbox5466.opentlc.com
metadata:
  name: crimson-biologics
compute:
  - name: worker
    platform:
      aws:
        type: m6i.xlarge
        rootVolume:
          iops: 0
          size: 120
          type: gp3
        zones:
          - us-east-1a
          - us-east-1b
          - us-east-1f
    replicas: 6
controlPlane:
  name: master
  platform:
    aws:
      type: m6i.xlarge
      rootVolume:
        iops: 0
        size: 120
        type: gp3
      zones:
        - us-east-1a
        - us-east-1b
        - us-east-1c
  replicas: 3
platform:
  aws:
    region: us-east-1
networking:
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
  networkType: OVNKubernetes
pullSecret: ''
sshKey: ''
