---
- name: Generate and Push OpenShift Project Manifests to Git
  hosts: localhost
  gather_facts: false
  vars:
    # Default variables (overridden by the AAP Survey)
    project_name: "default-dev-project"
    developer_username: "default-user"
    project_size: "small" 
    
    git_repo_url: "https://{{ git_username }}:{{ git_token }}@github.com/your-org/openshift-tenant-configs.git"
    clone_dir: "/tmp/openshift-tenant-configs"

    # THE GUARDRAILS: Define the exact sizes allowed
    size_limits:
      small:
        cpu_req: "1"
        mem_req: "1Gi"
        cpu_lim: "2"
        mem_lim: "2Gi"
      large:
        cpu_req: "2"
        mem_req: "2Gi"
        cpu_lim: "4"
        mem_lim: "8Gi"

  tasks:
    - name: Set resource limits based on the selected project_size
      ansible.builtin.set_fact:
        cpu_request: "{{ size_limits[project_size].cpu_req }}"
        mem_request: "{{ size_limits[project_size].mem_req }}"
        cpu_limit: "{{ size_limits[project_size].cpu_lim }}"
        mem_limit: "{{ size_limits[project_size].mem_lim }}"

    - name: Ensure clean workspace
      ansible.builtin.file:
        path: "{{ clone_dir }}"
        state: absent

    - name: Clone the GitOps repository
      ansible.builtin.git:
        repo: "{{ git_repo_url }}"
        dest: "{{ clone_dir }}"
        version: main

    - name: Template Kubernetes resources into Git repo
      ansible.builtin.template:
        src: templates/tenant-project.yml.j2
        dest: "{{ clone_dir }}/projects/{{ project_name }}.yaml"

    - name: Commit and push changes to Git
      ansible.builtin.shell: |
        git config user.name "AAP Automation"
        git config user.email "aap@yourorg.com"
        git add projects/{{ project_name }}.yaml
        # Notice we updated the commit message to include the size!
        git commit -m "Provision OpenShift project: {{ project_name }} (Size: {{ project_size }}) for {{ developer_username }}"
        git push origin main
      args:
        chdir: "{{ clone_dir }}"